; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = espidf

; Yêu cầu sử dụng vùng nhớ được chia
board_build.partitions = partitions.csv

; --- ÉP XUNG PHẦN CỨNG ---
; Ép CPU chạy max tốc độ 240MHz
board_build.f_cpu = 240000000L

build_unflags = -std=gnu99    ; Loại bỏ chuẩn C99 mặc định của ESP-IDF/Arduino
build_flags = 
    -std=gnu17                ; Sử dụng chuẩn C17 (GNU extension)

; --- CẤU HÌNH SERIAL MONITOR & UPLOAD ---
monitor_speed = 115200        ; Tốc độ đọc Log (ESP32 mặc định phải là 115200)
upload_speed = 921600         ; Tốc độ nạp code (ESP32 có thể nạp nhanh ở 921600)

monitor_filters = 
    direct                    ; Đọc log màu mè cho đẹp mắt